steps:
  # Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/ui-navigator-api:$SHORT_SHA
      - .
    dir: backend

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/ui-navigator-api:$SHORT_SHA

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - ui-navigator-api
      - --image=gcr.io/$PROJECT_ID/ui-navigator-api:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=50
      - --concurrency=80
      - --timeout=45
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production

options:
  logging: CLOUD_LOGGING_ONLY